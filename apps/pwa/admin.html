<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SthirMind — Admin</title>
<meta name="robots" content="noindex,nofollow" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0D1B2A;--surface:#152A3F;--border:rgba(255,255,255,.09);--gold:#F4A261;--txt:#EAF0F6;--muted:#8B9BB4;--green:#52B788}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;padding:20px}
  .wrap{max-width:1100px;margin:0 auto}
  h1{font-family:Georgia,serif;color:var(--gold);font-size:22px;margin-bottom:4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .login{max-width:360px;margin:80px auto;text-align:center}
  .login input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--txt);font-size:16px;margin:14px 0}
  .btn{background:var(--gold);color:#0D1B2A;border:none;border-radius:12px;padding:12px 24px;font-weight:700;font-size:14px;cursor:pointer}
  .err{color:#FF8A8A;font-size:13px;margin-top:8px;display:none}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .stat .v{font-size:26px;font-weight:800;color:var(--gold);margin-top:4px}
  table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:14px;overflow:hidden;font-size:13px}
  th{background:rgba(255,255,255,.04);text-align:left;padding:11px 12px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
  td{padding:11px 12px;border-top:1px solid var(--border);white-space:nowrap}
  tr:hover td{background:rgba(255,255,255,.02)}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:14px}
  .pill{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:700}
  .pill.hot{background:rgba(82,183,136,.18);color:var(--green)}
  .pill.cold{background:rgba(255,255,255,.07);color:var(--muted)}
  #panel{display:none}
  .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  .refresh{background:var(--surface);color:var(--txt);border:1px solid var(--border)}
</style>
</head>
<body>
<div class="wrap">
  <div class="login" id="login">
    <div style="font-size:44px">🛡️</div>
    <h1>SthirMind Admin</h1>
    <div class="sub">Hope Commoners Foundation</div>
    <input id="pw" type="password" placeholder="Admin password" onkeydown="if(event.key==='Enter')go()" />
    <button class="btn" onclick="go()">Open Panel →</button>
    <div class="err" id="err">Wrong password</div>
  </div>

  <div id="panel">
    <div class="top">
      <div><h1>🛡️ Users & Tracking</h1><div class="sub">SthirMind · Hope Commoners Foundation</div></div>
      <button class="btn refresh" onclick="go(true)">↻ Refresh</button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Joined</th><th>Last Seen</th><th>😊 Score</th><th>🔥 Streak</th><th>✅ Check-ins</th><th>📓 Journal</th><th>⏱ Focus</th><th>🎯 Goals</th><th>📚 Read</th></tr></thead>
      <tbody id="rows"></tbody>
    </table></div>
  </div>
</div>
<script>
let PW='';
async function go(refresh){
  const pw=refresh?PW:document.getElementById('pw').value;
  if(!pw)return;
  const r=await fetch('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  if(!r.ok){document.getElementById('err').style.display='block';return;}
  PW=pw;sessionStorage.setItem('sthir_admin',pw);
  const d=await r.json();
  document.getElementById('login').style.display='none';
  document.getElementById('panel').style.display='block';
  const t=d.totals;
  document.getElementById('stats').innerHTML=[
    ['Total Users',t.totalUsers],['Active Today',t.activeToday],['Avg Happiness',t.avgHappiness],
    ['Check-ins',t.totalCheckins],['Journal Entries',t.totalJournal],['Focus Minutes',t.totalFocusMins]
  ].map(([l,v])=>`<div class="stat"><div class="l">${l}</div><div class="v">${v}</div></div>`).join('');
  const todayStr=new Date().toISOString().slice(0,10);
  document.getElementById('rows').innerHTML=d.users.length?d.users.map(u=>`<tr>
    <td><b>${esc(u.name)}</b></td><td>${esc(u.email)}</td><td>${esc(u.phone||'—')}</td>
    <td>${u.joined}</td><td><span class="pill ${u.lastSeen===todayStr?'hot':'cold'}">${u.lastSeen}</span></td>
    <td>${u.happiness||'—'}</td><td>${u.streak}</td><td>${u.checkins}</td><td>${u.journalEntries}</td>
    <td>${u.focusMins}m</td><td>${u.goals}</td><td>${u.booksRead}</td></tr>`).join('')
    :'<tr><td colspan="12" style="text-align:center;color:var(--muted);padding:30px">No users yet</td></tr>';
}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
const saved=sessionStorage.getItem('sthir_admin');
if(saved){document.getElementById('pw').value=saved;go();}
</script>
</body>
</html>
