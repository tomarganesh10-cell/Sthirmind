version: '3.9'

# ── SthirMind Local Development Stack ────────────────────────
# docker compose up -d

services:

  # ── PostgreSQL 16 with pgvector ─────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sthirmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sthirmind
      POSTGRES_USER: sthirmind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sthirmind_dev}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=en_US.UTF-8'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../packages/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sthirmind -d sthirmind']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sthirmind-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Meilisearch ───────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: sthirmind-search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev_master_key_change_in_prod}
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data

  # ── API (NestJS) ─────────────────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: development
    container_name: sthirmind-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://sthirmind:${POSTGRES_PASSWORD:-sthirmind_dev}@postgres:5432/sthirmind
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - '3001:3001'
    volumes:
      - ../apps/api/src:/app/src:delegated
    command: pnpm dev

  # ── Web (Next.js) ────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      target: development
    container_name: sthirmind-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    ports:
      - '3000:3000'
    volumes:
      - ../apps/web/src:/app/src:delegated

  # ── Nginx (production only) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sthirmind-nginx
    restart: unless-stopped
    profiles: ['production']
    depends_on:
      - api
      - web
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  certbot_data:
