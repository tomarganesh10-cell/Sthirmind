version: '3.9'

# ── SthirMind Production Stack ────────────────────────────────
# Usage: docker compose -f docker-compose.prod.yml up -d

services:

  # ── PostgreSQL 16 + pgvector ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sthirmind-postgres
    restart: always
    environment:
      POSTGRES_DB: sthirmind
      POSTGRES_USER: sthirmind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sthirmind -d sthirmind']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [sthirmind]

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sthirmind-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [sthirmind]

  # ── API (NestJS) ─────────────────────────────────────────
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io/tomarganesh10-cell}/sthirmind-api:${IMAGE_TAG:-latest}
    container_name: sthirmind-api
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://sthirmind:${POSTGRES_PASSWORD}@postgres:5432/sthirmind
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: https://sthirmind.hopecommonersfoundation.com
      RATE_LIMIT_PER_MINUTE: 100
    expose:
      - '3001'
    networks: [sthirmind]
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Web (Next.js) ────────────────────────────────────────
  web:
    image: ${DOCKER_REGISTRY:-ghcr.io/tomarganesh10-cell}/sthirmind-web:${IMAGE_TAG:-latest}
    container_name: sthirmind-web
    restart: always
    depends_on:
      api: { condition: service_healthy }
    environment:
      NEXT_PUBLIC_API_URL: https://sthirmind.hopecommonersfoundation.com/api/v1
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NODE_ENV: production
    expose:
      - '3000'
    networks: [sthirmind]

  # ── Nginx + SSL ──────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sthirmind-nginx
    restart: always
    depends_on:
      - api
      - web
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_challenges:/var/www/certbot:ro
    networks: [sthirmind]

  # ── Certbot (auto-renew SSL) ─────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: sthirmind-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_challenges:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    networks: [sthirmind]

volumes:
  postgres_data:
  redis_data:
  certbot_challenges:

networks:
  sthirmind:
    driver: bridge
