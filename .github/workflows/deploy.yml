name: Deploy SthirMind

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/tomarganesh10-cell

jobs:
  # ── Build & Push Docker Images ──────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: echo "version=$(echo ${{ github.sha }} | head -c 8)" >> $GITHUB_OUTPUT

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sthirmind-api:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sthirmind-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://sthirmind.playplate.in/api/v1
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/sthirmind-web:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sthirmind-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS ───────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/sthirmind

            # Pull latest compose file
            git pull origin main

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Set image tag
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            export DOCKER_REGISTRY=ghcr.io/tomarganesh10-cell

            # Pull new images
            docker compose -f infra/docker-compose.prod.yml pull api web

            # Run DB migrations
            docker compose -f infra/docker-compose.prod.yml run --rm api \
              node -e "const {PrismaClient} = require('@prisma/client'); const p = new PrismaClient(); p.\$connect().then(() => { console.log('DB OK'); p.\$disconnect(); })"

            # Rolling restart (zero downtime)
            docker compose -f infra/docker-compose.prod.yml up -d --no-deps --scale api=2 api
            sleep 15
            docker compose -f infra/docker-compose.prod.yml up -d --no-deps api web

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployed $IMAGE_TAG successfully"

      - name: Health check
        run: |
          sleep 20
          curl -f https://sthirmind.playplate.in/health || exit 1
          echo "✅ Health check passed"
